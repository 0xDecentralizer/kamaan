backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
# Collections
# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ

collections:
  # в”Җв”Җв”Җ Articles (folder collection) в”Җв”Җв”Җ
  - name: "articles"
    label: "Щ…ЩӮШ§Щ„Ш§ШӘ"
    label_singular: "Щ…ЩӮШ§Щ„ЩҮ"
    folder: "src/articles"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} вҖ” {{category}}"
    preview_path: "/articles/{{slug}}/"
    fields:
      - name: "title"
        label: "Ш№ЩҶЩҲШ§ЩҶ"
        widget: "string"
        pattern: [".{5,200}", "Ш№ЩҶЩҲШ§ЩҶ ШЁШ§ЫҢШҜ Ыө ШӘШ§ ЫІЫ°Ы° Ъ©Ш§ШұШ§Ъ©ШӘШұ ШЁШ§ШҙШҜ"]
      - name: "excerpt"
        label: "ШӘЩҲШ¶ЫҢШӯШ§ШӘ Ъ©ЩҲШӘШ§ЩҮ"
        widget: "text"
        pattern: [".{10,500}", "ШӘЩҲШ¶ЫҢШӯШ§ШӘ ШЁШ§ЫҢШҜ ЫұЫ° ШӘШ§ ЫөЫ°Ы° Ъ©Ш§ШұШ§Ъ©ШӘШұ ШЁШ§ШҙШҜ"]
      - name: "category"
        label: "ШҜШіШӘЩҮвҖҢШЁЩҶШҜЫҢ"
        widget: "select"
        options:
          - { label: "ШӘШ§ШұЫҢШ®", value: "ШӘШ§ШұЫҢШ®" }
          - { label: "Щ…ЩҲШіЫҢЩӮЫҢ", value: "Щ…ЩҲШіЫҢЩӮЫҢ" }
          - { label: "ШҙШ№Шұ", value: "ШҙШ№Шұ" }
          - { label: "ЩҒШұЩҮЩҶЪҜ", value: "ЩҒШұЩҮЩҶЪҜ" }
      - name: "tags"
        label: "ШӘЪҜвҖҢЩҮШ§"
        widget: "list"
        allow_add: true
        minimal: true
        hint: "ШӘЪҜвҖҢЩҮШ§ЫҢ Щ…ШұШӘШЁШ· ШЁШ§ Щ…ЩӮШ§Щ„ЩҮ ШұШ§ Ш§Ш¶Ш§ЩҒЩҮ Ъ©ЩҶЫҢШҜ"
      - name: "image"
        label: "ШӘШөЩҲЫҢШұ Ъ©Ш§ЩҲШұ"
        widget: "image"
        required: false
        hint: "ШӘШөЩҲЫҢШұ ШҙШ§Ш®Шө Щ…ЩӮШ§Щ„ЩҮ (Ш§Ш®ШӘЫҢШ§ШұЫҢ)"
      - name: "date"
        label: "ШӘШ§ШұЫҢШ® Ш§ЩҶШӘШҙШ§Шұ"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      - name: "published"
        label: "Щ…ЩҶШӘШҙШұ ШҙШҜЩҮ"
        widget: "boolean"
        default: true
        hint: "ШәЫҢШұЩҒШ№Ш§Щ„ Ъ©ШұШҜЩҶ Ш§ЫҢЩҶ ЪҜШІЫҢЩҶЩҮ Щ…ЩӮШ§Щ„ЩҮ ШұШ§ Ш§ШІ ШіШ§ЫҢШӘ Щ…Ш®ЩҒЫҢ Щ…ЫҢвҖҢЪ©ЩҶШҜ"
      - name: "body"
        label: "Щ…ШӘЩҶ Щ…ЩӮШ§Щ„ЩҮ"
        widget: "markdown"
        hint: "Щ…ШӘЩҶ Ш§ШөЩ„ЫҢ Щ…ЩӮШ§Щ„ЩҮ ШұШ§ ШЁЩҶЩҲЫҢШіЫҢШҜ"

  # в”Җв”Җв”Җ Music Player (file collection вҖ” single JSON) в”Җв”Җв”Җ
  - name: "music"
    label: "ЩҫШ®ШҙвҖҢЪ©ЩҶЩҶШҜЩҮ Щ…ЩҲШіЫҢЩӮЫҢ"
    files:
      - name: "tracks"
        label: "ЩӮШ·Ш№Ш§ШӘ Щ…ЩҲШіЫҢЩӮЫҢ"
        file: "src/_data/music.json"
        description: "Щ„ЫҢШіШӘ ЩӮШ·Ш№Ш§ШӘ Щ…ЩҲШіЫҢЩӮЫҢ Ъ©ЩҮ ШҜШұ ЩҫШ®ШҙвҖҢЪ©ЩҶЩҶШҜЩҮ ШөЩҒШӯЩҮ Ш§ШөЩ„ЫҢ ЩҶЩ…Ш§ЫҢШҙ ШҜШ§ШҜЩҮ Щ…ЫҢвҖҢШҙЩҲЩҶШҜ"
        fields:
          - name: "tracks"
            label: "ЩӮШ·Ш№Ш§ШӘ"
            widget: "list"
            summary: "{{fields.title}} вҖ” {{fields.artist}}"
            collapsed: false
            fields:
              - name: "title"
                label: "Ш№ЩҶЩҲШ§ЩҶ ЩӮШ·Ш№ЩҮ"
                widget: "string"
              - name: "artist"
                label: "ЩҮЩҶШұЩ…ЩҶШҜ"
                widget: "string"
                default: "Ъ©ЫҢЩҮШ§ЩҶ Ъ©Щ„ЩҮШұ"
              - name: "instrument"
                label: "ШіШ§ШІ Ш§ШөЩ„ЫҢ"
                widget: "select"
                options:
                  - { label: "Ъ©Щ…Ш§ЩҶЪҶЩҮ", value: "Ъ©Щ…Ш§ЩҶЪҶЩҮ" }
                  - { label: "ШіЩҮвҖҢШӘШ§Шұ", value: "ШіЩҮвҖҢШӘШ§Шұ" }
                  - { label: "ШӘШ§Шұ", value: "ШӘШ§Шұ" }
                  - { label: "ЩҶЫҢ", value: "ЩҶЫҢ" }
                  - { label: "ШіЩҶШӘЩҲШұ", value: "ШіЩҶШӘЩҲШұ" }
              - name: "dastgah"
                label: "ШҜШіШӘЪҜШ§ЩҮ"
                widget: "select"
                options:
                  - { label: "ШҙЩҲШұ", value: "ШҙЩҲШұ" }
                  - { label: "ШіЩҮвҖҢЪҜШ§ЩҮ", value: "ШіЩҮвҖҢЪҜШ§ЩҮ" }
                  - { label: "ЪҶЩҮШ§ШұЪҜШ§ЩҮ", value: "ЪҶЩҮШ§ШұЪҜШ§ЩҮ" }
                  - { label: "Ш§ШЁЩҲШ№Ш·Ш§ШЎ", value: "Ш§ШЁЩҲШ№Ш·Ш§ШЎ" }
                  - { label: "ЩҮЫҢШІШ¬", value: "ЩҮЫҢШІШ¬" }
                  - { label: "ШҜШҙШӘЫҢ", value: "ШҜШҙШӘЫҢ" }
                  - { label: "Щ…Ш§ЩҮЩҲШұ", value: "Щ…Ш§ЩҮЩҲШұ" }
                  - { label: "ЩҶЩҲШ§", value: "ЩҶЩҲШ§" }
                  - { label: "ШЁЫҢШ§ШӘ ШӘШұЪ©", value: "ШЁЫҢШ§ШӘ ШӘШұЪ©" }
                  - { label: "ШЁЫҢШ§ШӘ Ш§ШөЩҒЩҮШ§ЩҶ", value: "ШЁЫҢШ§ШӘ Ш§ШөЩҒЩҮШ§ЩҶ" }
                  - { label: "ШұШ§ШіШӘ ЩҫЩҶШ¬вҖҢЪҜШ§ЩҮ", value: "ШұШ§ШіШӘ ЩҫЩҶШ¬вҖҢЪҜШ§ЩҮ" }
              - name: "duration"
                label: "Щ…ШҜШӘ ШІЩ…Ш§ЩҶ (Щ…:Ш«)"
                widget: "string"
                pattern: ["^\\d{1,2}:\\d{2}$", "ЩҒШұЩ…ШӘ ШөШӯЫҢШӯ: Ыҙ:ЫұЫө"]
                hint: "Щ…Ш«Ш§Щ„: Ыҙ:ЫұЫө"
              - name: "durationSeconds"
                label: "Щ…ШҜШӘ ШІЩ…Ш§ЩҶ (Ш«Ш§ЩҶЫҢЩҮ)"
                widget: "number"
                hint: "ШЁШұШ§ЫҢ Щ…ШӯШ§ШіШЁЩҮ ЩҫЫҢШҙШұЩҒШӘ ЩҶЩҲШ§Шұ ЩҫШ®Шҙ"
              - name: "url"
                label: "Щ„ЫҢЩҶЪ© ЩҒШ§ЫҢЩ„ ШөЩҲШӘЫҢ"
                widget: "string"
                required: false
                hint: "Щ„ЫҢЩҶЪ© Щ…ШіШӘЩӮЫҢЩ… ЩҒШ§ЫҢЩ„ MP3. Ш®Ш§Щ„ЫҢ ЪҜШ°Ш§ШҙШӘЩҶ = ШӯШ§Щ„ШӘ ЩҫЫҢШҙвҖҢЩҶЩ…Ш§ЫҢШҙ"
              - name: "dateAdded"
                label: "ШӘШ§ШұЫҢШ® Ш§Ш¶Ш§ЩҒЩҮ ШҙШҜЩҶ"
                widget: "datetime"
                format: "YYYY-MM-DD"
                date_format: "YYYY-MM-DD"
                time_format: false
              - name: "tags"
                label: "ШӘЪҜвҖҢЩҮШ§"
                widget: "list"
                allow_add: true
                minimal: true
          - name: "instruments"
            label: "ШіШ§ШІЩҮШ§ (Ш§Ш·Щ„Ш§Ш№Ш§ШӘЫҢ)"
            widget: "list"
            summary: "{{fields.name}}"
            hint: "Ш§Ш·Щ„Ш§Ш№Ш§ШӘ ШӘЩҲШөЫҢЩҒЫҢ ШіШ§ШІЩҮШ§ вҖ” ШЁШұШ§ЫҢ ЩҶЩ…Ш§ЫҢШҙ ШҜШұ ШЁШ®Шҙ ШіШ§ШІЩҮШ§ЫҢ Ш§ЫҢШұШ§ЩҶЫҢ"
            fields:
              - name: "name"
                label: "ЩҶШ§Щ… ШіШ§ШІ"
                widget: "string"
              - name: "description"
                label: "ШӘЩҲШ¶ЫҢШӯШ§ШӘ"
                widget: "text"

  # в”Җв”Җв”Җ Archive (file collection вҖ” single JSON) в”Җв”Җв”Җ
  - name: "archive"
    label: "ШўШұШҙЫҢЩҲ"
    files:
      - name: "archive"
        label: "ШўЫҢШӘЩ…вҖҢЩҮШ§ЫҢ ШўШұШҙЫҢЩҲ"
        file: "src/_data/archive.json"
        description: "ШўЩ„ШЁЩҲЩ…вҖҢЩҮШ§ШҢ ШӘЪ©вҖҢШўЩҮЩҶЪҜвҖҢЩҮШ§ШҢ Ъ©ЩҶШіШұШӘвҖҢЩҮШ§ ЩҲ ЩҲЫҢШҜЫҢЩҲЩҮШ§"
        fields:
          - name: "genres"
            label: "ЪҳШ§ЩҶШұЩҮШ§"
            widget: "list"
            minimal: true
            hint: "Щ„ЫҢШіШӘ ЪҳШ§ЩҶШұЩҮШ§ЫҢ Щ…ЩҲШ¬ЩҲШҜ ШЁШұШ§ЫҢ ЩҒЫҢЩ„ШӘШұ"
          - name: "instruments"
            label: "ШіШ§ШІЩҮШ§ (ЩҒЫҢЩ„ШӘШұ)"
            widget: "list"
            minimal: true
            hint: "Щ„ЫҢШіШӘ ШіШ§ШІЩҮШ§ ШЁШұШ§ЫҢ ЩҒЫҢЩ„ШӘШұ (Ш§ЩҲЩ„ЫҢ ШЁШ§ЫҢШҜ 'ЩҮЩ…ЩҮ' ШЁШ§ШҙШҜ)"
          - name: "types"
            label: "Ш§ЩҶЩҲШ§Ш№"
            widget: "list"
            minimal: true
            hint: "Щ„ЫҢШіШӘ Ш§ЩҶЩҲШ§Ш№ Щ…ШӯШӘЩҲШ§ ШЁШұШ§ЫҢ ЩҒЫҢЩ„ШӘШұ (Ш§ЩҲЩ„ЫҢ ШЁШ§ЫҢШҜ 'ЩҮЩ…ЩҮ' ШЁШ§ШҙШҜ)"
          - name: "items"
            label: "ШўЫҢШӘЩ…вҖҢЩҮШ§"
            widget: "list"
            summary: "{{fields.title}} вҖ” {{fields.type}}"
            collapsed: false
            fields:
              - name: "id"
                label: "ШҙЩҶШ§ШіЩҮ (ID)"
                widget: "string"
                hint: "ШҙЩҶШ§ШіЩҮ ЫҢЪ©ШӘШ§ ШЁЩҮ Ш§ЩҶЪҜЩ„ЫҢШіЫҢШҢ ШЁШ§ Ш®Ш· ШӘЫҢШұЩҮ. Щ…Ш«Ш§Щ„: shor-kamancheh"
                pattern: ["^[a-z0-9\\-]+$", "ЩҒЩӮШ· ШӯШұЩҲЩҒ Ъ©ЩҲЪҶЪ© Ш§ЩҶЪҜЩ„ЫҢШіЫҢШҢ Ш§Ш№ШҜШ§ШҜ ЩҲ Ш®Ш· ШӘЫҢШұЩҮ"]
              - name: "title"
                label: "Ш№ЩҶЩҲШ§ЩҶ"
                widget: "string"
              - name: "type"
                label: "ЩҶЩҲШ№"
                widget: "select"
                options:
                  - { label: "ШўЩ„ШЁЩҲЩ…", value: "ШўЩ„ШЁЩҲЩ…" }
                  - { label: "ШӘЪ©вҖҢШўЩҮЩҶЪҜ", value: "ШӘЪ©вҖҢШўЩҮЩҶЪҜ" }
                  - { label: "Ъ©ЩҶШіШұШӘ", value: "Ъ©ЩҶШіШұШӘ" }
                  - { label: "ЩҲЫҢШҜЫҢЩҲ", value: "ЩҲЫҢШҜЫҢЩҲ" }
              - name: "artist"
                label: "ЩҮЩҶШұЩ…ЩҶШҜ"
                widget: "string"
                default: "Ъ©ЫҢЩҮШ§ЩҶ Ъ©Щ„ЩҮШұ"
              - name: "instruments"
                label: "ШіШ§ШІЩҮШ§"
                widget: "list"
                allow_add: true
                minimal: true
              - name: "dastgah"
                label: "ШҜШіШӘЪҜШ§ЩҮ"
                widget: "select"
                allow_blank: true
                options:
                  - { label: "вҖ” ШЁШҜЩҲЩҶ ШҜШіШӘЪҜШ§ЩҮ вҖ”", value: "" }
                  - { label: "ШҙЩҲШұ", value: "ШҙЩҲШұ" }
                  - { label: "ШіЩҮвҖҢЪҜШ§ЩҮ", value: "ШіЩҮвҖҢЪҜШ§ЩҮ" }
                  - { label: "ЪҶЩҮШ§ШұЪҜШ§ЩҮ", value: "ЪҶЩҮШ§ШұЪҜШ§ЩҮ" }
                  - { label: "Ш§ШЁЩҲШ№Ш·Ш§ШЎ", value: "Ш§ШЁЩҲШ№Ш·Ш§ШЎ" }
                  - { label: "ЩҮЫҢШІШ¬", value: "ЩҮЫҢШІШ¬" }
                  - { label: "ШҜШҙШӘЫҢ", value: "ШҜШҙШӘЫҢ" }
                  - { label: "Щ…Ш§ЩҮЩҲШұ", value: "Щ…Ш§ЩҮЩҲШұ" }
                  - { label: "ЩҶЩҲШ§", value: "ЩҶЩҲШ§" }
                  - { label: "ШЁЫҢШ§ШӘ ШӘШұЪ©", value: "ШЁЫҢШ§ШӘ ШӘШұЪ©" }
                  - { label: "ШЁЫҢШ§ШӘ Ш§ШөЩҒЩҮШ§ЩҶ", value: "ШЁЫҢШ§ШӘ Ш§ШөЩҒЩҮШ§ЩҶ" }
              - name: "genre"
                label: "ЪҳШ§ЩҶШұ"
                widget: "select"
                options:
                  - { label: "Ъ©Щ„Ш§ШіЫҢЪ© Ш§ЫҢШұШ§ЩҶЫҢ", value: "Ъ©Щ„Ш§ШіЫҢЪ© Ш§ЫҢШұШ§ЩҶЫҢ" }
                  - { label: "Ш№ШҙЩӮЫҢ", value: "Ш№ШҙЩӮЫҢ" }
                  - { label: "Ш№ШұЩҒШ§ЩҶЫҢ", value: "Ш№ШұЩҒШ§ЩҶЫҢ" }
                  - { label: "ШЁШІЩ…ЫҢ", value: "ШЁШІЩ…ЫҢ" }
                  - { label: "ШӯЩ…Ш§ШіЫҢ", value: "ШӯЩ…Ш§ШіЫҢ" }
              - name: "year"
                label: "ШіШ§Щ„ (ЩҒШ§ШұШіЫҢ)"
                widget: "string"
                hint: "Щ…Ш«Ш§Щ„: ЫұЫҙЫ°Ыі"
                pattern: ["^\\d{4}$", "ЩҒЩӮШ· Ыҙ ШұЩӮЩ… ЩҒШ§ШұШіЫҢ"]
              - name: "description"
                label: "ШӘЩҲШ¶ЫҢШӯШ§ШӘ"
                widget: "text"
              - name: "tracks"
                label: "Щ„ЫҢШіШӘ ЩӮШ·Ш№Ш§ШӘ"
                widget: "list"
                required: false
                hint: "ЩҒЩӮШ· ШЁШұШ§ЫҢ ШўЩ„ШЁЩҲЩ… ЩҲ Ъ©ЩҶШіШұШӘ"
                fields:
                  - name: "title"
                    label: "Ш№ЩҶЩҲШ§ЩҶ ЩӮШ·Ш№ЩҮ"
                    widget: "string"
                  - name: "duration"
                    label: "Щ…ШҜШӘ ШІЩ…Ш§ЩҶ"
                    widget: "string"
                    pattern: ["^\\d{1,2}:\\d{2}$", "ЩҒШұЩ…ШӘ ШөШӯЫҢШӯ: Ыҙ:ЫұЫө"]
              - name: "tags"
                label: "ШӘЪҜвҖҢЩҮШ§"
                widget: "list"
                allow_add: true
                minimal: true

  # в”Җв”Җв”Җ Site Settings (file collection) в”Җв”Җв”Җ
  - name: "settings"
    label: "ШӘЩҶШёЫҢЩ…Ш§ШӘ"
    files:
      - name: "site"
        label: "ШӘЩҶШёЫҢЩ…Ш§ШӘ ШіШ§ЫҢШӘ"
        file: "src/_data/site.json"
        fields:
          - name: "title"
            label: "Ш№ЩҶЩҲШ§ЩҶ ШіШ§ЫҢШӘ"
            widget: "string"
          - name: "description"
